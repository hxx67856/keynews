<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이슈 브리핑 — 키워드 이슈 수집 &amp; 보고서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a class="nav-logo" href="/">
        <span class="logo-mark">IB</span>
        <span class="logo-text">Issue Briefing</span>
      </a>
      <div class="nav-actions">
        <span class="nav-meta">최근 7일 · Google News RSS</span>
      </div>
    </div>
  </nav>

  <header class="hero-band">
    <div class="hero-dots" aria-hidden="true">
      <span class="dot dot-pink"></span>
      <span class="dot dot-orange"></span>
      <span class="dot dot-teal"></span>
      <span class="dot dot-purple"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
    </div>
    <div class="hero-inner">
      <span class="badge-purple">Issue Briefing</span>
      <h1 class="hero-title">키워드 이슈를<br />한눈에 파악하세요</h1>
      <p class="hero-subtitle">키워드를 입력하면 최근 7일 이내 주요 이슈를 자동 수집하고, HTML 보고서를 생성해 드립니다.</p>
    </div>

    <div class="workspace-mockup">
      <div class="mockup-toolbar">
        <span class="mockup-dot"></span>
        <span class="mockup-dot"></span>
        <span class="mockup-dot"></span>
        <span class="mockup-label">이슈 검색 · 보고서 생성</span>
      </div>
      <div class="mockup-body">
        <form id="search-form">
          <div class="search-row">
            <input id="keyword-input" class="text-input" type="text" placeholder="예: 인공지능 규제, 반도체 수출..." aria-label="검색 키워드" />
            <button type="submit" class="btn-primary" id="search-btn">이슈 검색</button>
          </div>
        </form>

        <div class="examples" id="examples"></div>

        <div class="email-row">
          <input id="email-input" class="text-input" type="email" placeholder="보고서를 받을 이메일 주소" aria-label="이메일 주소" />
          <button type="button" class="btn-secondary" id="email-btn">이메일로 보고서 받기</button>
        </div>
        <p id="email-hint" class="email-hint hidden"></p>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="alert" class="alert hidden"></div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>최근 7일 뉴스를 수집하고 보고서를 생성하고 있습니다...</p>
    </div>

    <div id="results" class="results hidden"></div>
  </main>

  <footer class="footer-region">
    <div class="footer-inner">
      <p class="footer-brand">Issue Briefing</p>
      <p class="footer-note">Google News RSS 기반 · 수집 기간 최근 7일 · 출처는 각 기사 원문 링크로 확인할 수 있습니다</p>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
